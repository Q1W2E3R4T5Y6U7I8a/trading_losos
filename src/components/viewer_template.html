<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>MA CROSSOVER // 3D TRADE FLOW</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&display=swap" rel="stylesheet">
<style>
:root {
  --g:  #00ff41;
  --r:  #ff3344;
  --y:  #ffdd00;
  --bg: #010105;
  --dim: #333;
  --panel-bg: rgba(2,4,8,0.96);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { overflow: hidden; background: var(--bg); color: var(--g); font-family: 'JetBrains Mono', monospace; }

/* top bar */
#topbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  display: flex; justify-content: space-between; align-items: baseline;
  padding: 14px 20px 10px;
  background: rgba(1,1,5,0.85);
  border-bottom: 1px solid #00ff4118;
  backdrop-filter: blur(8px);
  pointer-events: none;
}
#totalpnl { font-size: 32px; font-weight: 700; letter-spacing: -1px; font-family: monospace; }
#totalpnl.pos { color: var(--g); text-shadow: 0 0 8px #00ff4144; }
#totalpnl.neg { color: var(--r); text-shadow: 0 0 8px #ff334444; }
#stats { text-align: right; font-size: 9px; color: #aaa; line-height: 1.8; }
#stats b { color: #ddd; }

#prog { position: fixed; top: 0; left: 0; height: 2px; background: var(--g); z-index: 200; transition: width .3s; }

#botbar {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
  display: flex; justify-content: space-between;
  padding: 8px 20px; font-size: 9px; color: #444;
  background: rgba(1,1,5,0.8); border-top: 1px solid #00ff4110;
  backdrop-filter: blur(8px); pointer-events: none;
}

.dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--g); animation: pulse 1.5s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.25} }

/* side panels */
.panel {
  position: fixed; top: 50%; z-index: 200;
  background: var(--panel-bg); backdrop-filter: blur(14px);
  border: 1px solid #00ff4144; border-radius: 10px;
  padding: 14px; font-size: 10px;
  transition: transform .3s cubic-bezier(.2,.9,.4,1.1), opacity .25s;
  pointer-events: auto;
}
.panel h3 { color: var(--g); font-size: 11px; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid #00ff4122; }

.panel-toggle {
  position: fixed; top: 50%;
  background: #00ff4114; border: 1px solid #00ff4166; border-radius: 30px;
  width: 28px; height: 56px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; z-index: 201; backdrop-filter: blur(6px);
  font-size: 14px; color: var(--g);
  transition: background .2s;
  pointer-events: auto;
}
.panel-toggle:hover { background: #00ff4144; }

#filterPanel { right: 20px; transform: translateY(-50%); min-width: 170px; }
#filterPanel.hidden { transform: translateY(-50%) translateX(120%); opacity: 0; pointer-events: none; }
#filterToggle  { right: 20px; transform: translateY(-50%); }

.f-section { margin-bottom: 12px; border-bottom: 1px solid #00ff4115; padding-bottom: 8px; }
.f-label   { color: #888; font-size: 8px; font-weight: 700; margin-bottom: 6px; letter-spacing: 2px; }
.f-item    { margin: 5px 0; display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 9px; }
.f-item:hover { color: var(--g); }
.f-item input  { cursor: pointer; accent-color: var(--g); }
#symList   { max-height: 220px; overflow-y: auto; scrollbar-width: thin; }
.f-btns    { display: flex; gap: 6px; margin-top: 10px; }
.f-btn { background: #00ff4114; border: 1px solid #00ff4155; color: var(--g); padding: 4px 10px; font-size: 9px; cursor: pointer; border-radius: 4px; font-family: inherit; }
.f-btn:hover { background: #00ff4133; }

#histPanel { left: 20px; transform: translateY(-50%); min-width: 260px; max-width: 300px; }
#histPanel.hidden { transform: translateY(-50%) translateX(-120%); opacity: 0; pointer-events: none; }
#histToggle { left: 20px; transform: translateY(-50%); }

#tradeList { max-height: 340px; overflow-y: auto; scrollbar-width: thin; }
.trade-item {
  padding: 7px 8px; margin-bottom: 4px;
  border-radius: 5px; border: 1px solid transparent;
  font-size: 9px; line-height: 1.6;
}
.trade-item.pos { background: #00ff4108; }
.trade-item.neg { background: #ff334408; }
.trade-item.open { background: #ffdd0008; border-color: #ffdd0044; }
.trade-header { display: flex; justify-content: space-between; margin-bottom: 3px; }
.trade-sym  { font-weight: 700; font-size: 10px; }
.trade-pnl  { font-weight: 700; }
.trade-pnl.pos { color: var(--g); }
.trade-pnl.neg { color: var(--r); }
.trade-pnl.live { color: var(--y); }
.trade-meta { color: #ccc; font-size: 8px; }
.trade-dir-buy  { color: #4af; }
.trade-dir-sell { color: #f84; }
.trade-open-badge { background: #ffdd0022; color: var(--y); border: 1px solid #ffdd0044; border-radius: 3px; padding: 1px 5px; font-size: 7px; }

#histSummary { border-bottom: 1px solid #00ff4133; padding-bottom: 10px; margin-bottom: 10px; font-size: 9px; }
#histSummary .row { display: flex; justify-content: space-between; margin: 3px 0; }
#histSummary .lbl { color: #aaa; }
#histSummary .val { color: #ddd; }
#histSummary .val.pos { color: var(--g); }
#histSummary .val.neg { color: var(--r); }

#tip {
  position: fixed; background: rgba(1,1,5,0.97); border: 1px solid var(--g);
  border-radius: 7px; padding: 12px 16px; font-size: 10px; color: #ddd;
  pointer-events: none; z-index: 1000; backdrop-filter: blur(10px);
  opacity: 0; transition: opacity .12s; max-width: 260px;
}
#tip.on { opacity: 1; }
.tip-sym  { font-size: 14px; font-weight: 700; margin-bottom: 6px; }
.tip-pnl  { font-size: 20px; font-weight: 700; margin: 4px 0 8px; }
.tip-row  { display: flex; justify-content: space-between; gap: 20px; margin: 4px 0; font-size: 9px; }
.tip-lbl  { color: #888; }
.tip-val  { font-weight: 700; }
.tip-val.pos { color: var(--g); }
.tip-val.neg { color: var(--r); }
.tip-val.neu { color: var(--y); }
.tip-div  { height: 1px; background: #00ff4120; margin: 7px 0; }

#liveIndicator {
  position: fixed; bottom: 8px; left: 50%; transform: translateX(-50%);
  font-size: 8px; color: #444; z-index: 101; pointer-events: none;
}
#liveIndicator.connected { color: #00ff4166; }

    <button id="btnMA" style="background: #00ff4114; border: 1px solid #00ff4166; color: #00ff41; font-family: monospace; font-size: 11px; padding: 6px 16px; border-radius: 30px; cursor: pointer; transition: all 0.2s;">📈 MA CROSSOVER</button>

<script>
// Strategy switcher logic
const btnMA = document.getElementById('btnMA');
const btnRSI = document.getElementById('btnRSI');
const strategyIndicator = document.getElementById('strategyIndicator');

function setActiveButton(strategy) {
    if (strategy === 'ma') {
        btnMA.classList.add('active-strategy');
        btnRSI.classList.remove('active-strategy');
        strategyIndicator.innerHTML = '📈 MA ACTIVE';
        strategyIndicator.style.color = '#00ff41';
    } else {
        btnRSI.classList.add('active-strategy');
        btnMA.classList.remove('active-strategy');
        strategyIndicator.innerHTML = '📉 RSI ACTIVE';
        strategyIndicator.style.color = '#ffdd00';
    }
}

async function switchStrategy(strategy) {
    try {
        const response = await fetch('/switch', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ strategy: strategy })
        });
        
        if (response.ok) {
            setActiveButton(strategy);
            // Visual feedback
            strategyIndicator.style.opacity = '0.5';
            setTimeout(() => { strategyIndicator.style.opacity = '1'; }, 200);
            
            // Force refresh data
            const dataRes = await fetch('/data');
            const newData = await dataRes.json();
            if (newData.symbols) {
                render3D(newData);
                updateTradeHistory(newData);
            }
        }
    } catch (e) {
        console.error('Switch failed:', e);
        strategyIndicator.innerHTML = '⚠️ SWITCH FAILED';
        setTimeout(() => {
            const current = strategyIndicator.innerHTML.includes('MA') ? '📈 MA ACTIVE' : '📉 RSI ACTIVE';
            strategyIndicator.innerHTML = current;
        }, 1000);
    }
}

btnMA.addEventListener('click', () => switchStrategy('ma'));
btnRSI.addEventListener('click', () => switchStrategy('rsi'));

// Get current strategy on load
async function getCurrentStrategy() {
    try {
        const res = await fetch('/strategy');
        const info = await res.json();
        setActiveButton(info.current);
    } catch(e) {}
}

getCurrentStrategy();
</script>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
  }

</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

// ========== CORE CONSTANTS ==========
const Y_SCALE = 20 / 48;        // unified scale: maps cumulative PnL (max ~48) to y-range [0,20]
const yScale = cum => Math.max(-5, Math.min(22, cum * Y_SCALE));
const pnlColor = v => v > 0.8 ? '#00ff41' : v < -0.8 ? '#ff3344' : '#ffdd00';
const pnlClass = v => v > 0.8 ? 'pos' : v < -0.8 ? 'neg' : 'neu';
const fmt = (v, prefix = true) => (prefix && v >= 0 ? '+' : '') + '$' + Math.abs(v).toFixed(2);
const fmtTime = ts => new Date(ts * 1000).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
const fmtDur = (a, b) => { const h = Math.round((b - a) / 3600); return h + 'h'; };

// GLOBAL STATE
let currentData = null;
let visibleSyms = new Set();
let symbolMeshes = new Map();      // symbol -> { objects: [], label: CSS2DObject }

let raycastable = [];

// THREE SCENE
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x010105);
scene.fog = new THREE.FogExp2(0x010105, 0.008);

const camera = new THREE.PerspectiveCamera(45, innerWidth / innerHeight, 0.1, 1000);
camera.position.set(22, 16, 38);
camera.lookAt(8, 2, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

const css2d = new CSS2DRenderer();
css2d.setSize(innerWidth, innerHeight);
css2d.domElement.style.cssText = 'position:absolute;top:0;left:0;pointer-events:none;z-index:2';
document.body.appendChild(css2d.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.07;
controls.autoRotate = false;
controls.enableZoom = true;

// Lighting
scene.add(new THREE.AmbientLight(0x111122, 0.9));
const sun = new THREE.DirectionalLight(0xffffff, 1.2);
sun.position.set(12, 22, 10);
sun.castShadow = true;
scene.add(sun);
const fill = new THREE.PointLight(0x3366ff, 0.5);
fill.position.set(-8, 12, 15);
scene.add(fill);

// Grid & helpers
const grid = new THREE.GridHelper(65, 32, 0x00ff41, 0x00ff41);
grid.material.transparent = true;
grid.material.opacity = 0.12;
grid.position.y = -0.2;
scene.add(grid);

const originSphere = new THREE.Mesh(
  new THREE.SphereGeometry(0.12, 16, 16),
  new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0x00ff41, emissiveIntensity: 0.6 })
);
scene.add(originSphere);

function mkLabel(text, x, y, z, color = '#aaa', size = '8px') {
  const div = document.createElement('div');
  div.textContent = text;
  Object.assign(div.style, { color, fontSize: size, background: 'rgba(1,1,5,.7)', padding: '2px 6px', borderRadius: '3px', fontFamily: 'monospace' });
  const obj = new CSS2DObject(div);
  obj.position.set(x, y, z);
  scene.add(obj);
}
// Time axis ticks
[-24, -20, -16, -12, -8, -4, 0, 4, 8].forEach(h => {
  if (h < -26 || h > 16) return;
  const text = h === 0 ? '◀ NOW' : h > 0 ? `+${h}h` : `${Math.abs(h)}h ago`;
  mkLabel(text, h, -1.8, 15.5, h === 0 ? '#00ff41' : '#555', '7px');
});
mkLabel('← HOURS AGO / FORWARD →', 4, -2.2, 17, '#00ff4166', '7px');

// Tooltip system
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
const tip = document.getElementById('tip');
function showTip(symbol, data, e) {
  if (!data) return;
  const pnl = data.profits?.[symbol] || 0;
  const pos = data.open_positions?.[symbol];
  const trades = (data.trades || []).filter(t => t.symbol === symbol);
  const wins = trades.filter(t => t.pnl > 0).length;
  const wr = trades.length ? ((wins / trades.length) * 100).toFixed(0) + '%' : '—';
  const avg = trades.length ? trades.reduce((a, t) => a + t.pnl, 0) / trades.length : 0;
  const pc = pnlClass(pnl);
  tip.innerHTML = `
    <div class="tip-sym ${pc}">${symbol}</div>
    <div class="tip-pnl ${pc}">${fmt(pnl)}</div>
    <div class="tip-div"></div>
    <div class="tip-row"><span class="tip-lbl">Status</span><span class="tip-val">${pos ? '<span class="y">● OPEN</span>' : trades.length ? 'CLOSED' : 'WAITING'}</span></div>
    ${pos ? `<div class="tip-row"><span class="tip-lbl">Direction</span><span class="tip-val">${pos.type}</span></div>
    <div class="tip-row"><span class="tip-lbl">Unrealized</span><span class="tip-val ${pnlClass(pos.unrealized_pnl)}">${fmt(pos.unrealized_pnl)}</span></div>` : ''}
    <div class="tip-row"><span class="tip-lbl">Closed trades</span><span class="tip-val">${trades.length}</span></div>
    <div class="tip-row"><span class="tip-lbl">Win rate</span><span class="tip-val">${wr}</span></div>
    <div class="tip-row"><span class="tip-lbl">Avg P&L</span><span class="tip-val ${pnlClass(avg)}">${trades.length ? fmt(avg) : '—'}</span></div>
  `;
  tip.classList.add('on');
  updateTipPos(e);
}
function hideTip() { tip.classList.remove('on'); }
function updateTipPos(e) { tip.style.left = (e.clientX + 14) + 'px'; tip.style.top = (e.clientY + 14) + 'px'; }
window.addEventListener('mousemove', (e) => {
  mouse.x = (e.clientX / renderer.domElement.clientWidth) * 2 - 1;
  mouse.y = -(e.clientY / renderer.domElement.clientHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(raycastable);
  if (hits.length && hits[0].object.userData?.symbol && currentData) {
    showTip(hits[0].object.userData.symbol, currentData, e);
  } else hideTip();
  if (tip.classList.contains('on')) updateTipPos(e);
});

// Tube generator
function mkTube(pts, color, radius = 0.09, opacity = 1) {
  if (pts.length < 2) return null;
  const curve = new THREE.CatmullRomCurve3(pts);
  const geo = new THREE.TubeGeometry(curve, Math.max(64, pts.length * 6), radius, 6, false);
  const mat = new THREE.MeshStandardMaterial({ color, emissive: color, emissiveIntensity: 0.25, roughness: 0.4, metalness: 0.65, transparent: opacity < 1, opacity });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.castShadow = true;
  return mesh;
}

function clearScene() {
  raycastable = [];
  const keep = new Set([originSphere, grid]);
  const toRemove = [];
  scene.children.forEach(c => {
    if (keep.has(c) || c.isLight || c.isArrowHelper || c instanceof THREE.GridHelper || c.isCSS2DObject) return;
    if (c.userData?.isConnector) toRemove.push(c);
    else if (!c.isCSS2DObject) toRemove.push(c);
  });
  toRemove.forEach(c => {
    if (c.geometry) c.geometry.dispose();
    if (c.material) c.material.dispose();
    scene.remove(c);
  });
  symbolMeshes.clear();
}

// Build vertical connectors between symbols at matching timestamps
function buildConnectors(symPtsMap, nowTs) {
  const allTs = new Set();
  symPtsMap.forEach(pts => pts.forEach(p => allTs.add(p.userData_ts)));
  const sortedTs = [...allTs].sort((a, b) => a - b);
  const step = Math.max(1, Math.floor(sortedTs.length / 24));
  const connectors = [];
  const symKeys = [...symPtsMap.keys()];
  sortedTs.forEach((ts, idx) => {
    if (idx % step !== 0) return;
    const vertPts = [];
    symKeys.forEach(sym => {
      const pts = symPtsMap.get(sym);
      const match = pts.reduce((best, p) => Math.abs(p.userData_ts - ts) < Math.abs(best.userData_ts - ts) ? p : best, pts[0]);
      if (match) vertPts.push(new THREE.Vector3(match.x, match.y, match.z));
    });
    if (vertPts.length < 2) return;
    vertPts.sort((a, b) => a.z - b.z);
    const geo = new THREE.BufferGeometry().setFromPoints(vertPts);
    const mat = new THREE.LineBasicMaterial({ color: 0x00ff41, transparent: true, opacity: 0.475 });
    const line = new THREE.Line(geo, mat);
    line.userData = { isConnector: true };
    scene.add(line);
    connectors.push(line);
  });
  return connectors;
}

function updateVisibility() {
  const anyVisible = visibleSyms.size >= 2;
  symbolMeshes.forEach(({ objects, label }, sym) => {
    const v = visibleSyms.has(sym);
    objects.forEach(obj => { if (obj) obj.visible = v; });
    if (label) {
      label.visible = v;
      // Make deselected labels much more transparent
      if (label.element) {
        label.element.style.opacity = v ? '0' : '0';  // 0.08 = 8% opacity when deselected
      }
    }
  });
}

// Filter panel builder
function getCurrencyGroup(s) {
  const pairs = [['USD','🇺🇸 USD'], ['EUR','🇪🇺 EUR'], ['GBP','🇬🇧 GBP'], ['JPY','🇯🇵 JPY'], ['CHF','🇨🇭 CHF'], ['CAD','🇨🇦 CAD'], ['AUD','🇦🇺 AUD'], ['NZD','🇳🇿 NZD']];
  for (const [cur, flag] of pairs) if (s.includes(cur)) return flag;
  return '🌐 OTHER';
}
function buildFilterPanel(syms, data) {
  const groups = {};
  syms.forEach(s => { const g = getCurrencyGroup(s); groups[g] = groups[g] || []; groups[g].push(s); });
  const cDiv = document.getElementById('currencyFilters');
  cDiv.innerHTML = '';
  Object.entries(groups).forEach(([g, gsyms]) => {
    const allOn = gsyms.every(s => visibleSyms.has(s));
    const row = document.createElement('div'); row.className = 'f-item';
    row.innerHTML = `<input type="checkbox" ${allOn ? 'checked' : ''}><label>${g} (${gsyms.length})</label>`;
    row.querySelector('input').onchange = e => {
      gsyms.forEach(s => e.target.checked ? visibleSyms.add(s) : visibleSyms.delete(s));
      updateVisibility();
      buildFilterPanel(syms, data);
    };
    cDiv.appendChild(row);
  });
  const sDiv = document.getElementById('symList');
  sDiv.innerHTML = '';
  syms.forEach(s => {
    const pnlVal = data.profits?.[s] || 0;
    const row = document.createElement('div'); row.className = 'f-item';
    row.innerHTML = `<input type="checkbox" ${visibleSyms.has(s) ? 'checked' : ''}><label style="color:${pnlColor(pnlVal)}">${s}</label>`;
    row.querySelector('input').onchange = e => {
      e.target.checked ? visibleSyms.add(s) : visibleSyms.delete(s);
      updateVisibility();
      buildFilterPanel(syms, data);
    };
    sDiv.appendChild(row);
  });
}

// Trade history UI
function updateTradeHistory(data) {
  const trades = (data.trades || []).slice().reverse();
  const open = data.open_positions || {};
  const wins = trades.filter(t => t.pnl > 0).length;
  const wr = trades.length ? ((wins / trades.length) * 100).toFixed(0) + '%' : '—';
  const avg = trades.length ? trades.reduce((a, t) => a + t.pnl, 0) / trades.length : null;
  const best = trades.length ? Math.max(...trades.map(t => t.pnl)) : null;
  const worst = trades.length ? Math.min(...trades.map(t => t.pnl)) : null;
  document.getElementById('sTrades').textContent = trades.length;
  document.getElementById('sWinRate').textContent = wr;
  document.getElementById('sAvg').textContent = avg !== null ? fmt(avg) : '—';
  document.getElementById('sAvg').className = avg !== null ? 'val ' + pnlClass(avg) : 'val';
  document.getElementById('sBest').textContent = best !== null ? fmt(best) : '—';
  document.getElementById('sWorst').textContent = worst !== null ? fmt(worst) : '—';
  
  const list = document.getElementById('tradeList');
  const frags = [];
  Object.entries(open).forEach(([sym, p]) => {
    const upnl = p.unrealized_pnl || 0;
    frags.push(`<div class="trade-item open"><div class="trade-header"><span class="trade-sym">${sym}</span><span class="trade-pnl live">${fmt(upnl)}</span></div><div class="trade-meta"><span class="trade-dir-${p.type.toLowerCase()}">${p.type}</span> &nbsp;·&nbsp;open ${fmtTime(p.open_time)} &nbsp;·&nbsp;closes ${fmtTime(p.close_time)} <span class="trade-open-badge">LIVE</span></div></div>`);
  });
  trades.slice(0, 45).forEach(t => {
    const pc = pnlClass(t.pnl);
    frags.push(`<div class="trade-item ${pc}"><div class="trade-header"><span class="trade-sym">${t.symbol}</span><span class="trade-pnl ${pc}">${fmt(t.pnl)}</span></div><div class="trade-meta"><span class="trade-dir-${t.type.toLowerCase()}">${t.type}</span> &nbsp;·&nbsp;${fmtTime(t.open_time)} → ${fmtTime(t.close_time)} &nbsp;·&nbsp;${fmtDur(t.open_time, t.close_time)} hold</div></div>`);
  });
  list.innerHTML = frags.join('');
}

// MAIN 3D RENDER
function render3D(data) {
  currentData = data;
  const syms = data.symbols.slice(0, 27);
  if (visibleSyms.size === 0) syms.forEach(s => visibleSyms.add(s));
  
  // Top bar update
  const totalPnl = Object.values(data.profits || {}).reduce((a, b) => a + b, 0);
  const totalEl = document.getElementById('totalpnl');
  totalEl.textContent = fmt(totalPnl);
  totalEl.className = pnlClass(totalPnl);
  document.getElementById('simTime').textContent = fmtTime(data.timestamp);
  document.getElementById('pctDone').textContent = (data.progress * 100).toFixed(1);
  document.getElementById('prog').style.width = (data.progress * 100) + '%';
  document.getElementById('symCount').textContent = syms.length;
  document.getElementById('openCount').textContent = Object.keys(data.open_positions || {}).length;
  
  clearScene();
  
  const symPtsMap = new Map();
  // Draw per-symbol tubes
  syms.forEach((sym, idx) => {
    const hist = data.history[sym] || [];
    if (hist.length < 2) return;
    const pnlVal = data.profits?.[sym] || 0;
    const col = new THREE.Color(pnlColor(pnlVal));
    const zPos = idx - 13;
    const pts = [];
    const objects = [];
    
    hist.forEach(([ts, cum]) => {
      const x = (ts - data.timestamp) / 3600;
      const y = yScale(cum);
      const v = new THREE.Vector3(x, y, zPos);
      v.userData_ts = ts;
      pts.push(v);
      const sphereMat = new THREE.MeshStandardMaterial({ color: col, emissive: col, emissiveIntensity: 0.35 });
      const sphere = new THREE.Mesh(new THREE.SphereGeometry(0.095, 12, 12), sphereMat);
      sphere.position.set(x, y, zPos);
      sphere.userData = { symbol: sym };
      scene.add(sphere);
      raycastable.push(sphere);
      objects.push(sphere);
    });
    symPtsMap.set(sym, pts);
    
    const tube = mkTube(pts, col);
    if (tube) {
      tube.userData = { symbol: sym };
      scene.add(tube);
      raycastable.push(tube);
      objects.push(tube);
    }
    
    // Open position tail (yellow)
    const pos = (data.open_positions || {})[sym];
    if (pos && pts.length) {
      const lastPt = pts[pts.length - 1];
      const curY = yScale(pnlVal);
      const tailPts = [lastPt.clone(), new THREE.Vector3(0, curY, zPos)];
      const tailTube = mkTube(tailPts, new THREE.Color(0xffaa00), 0.055, 0.65);
      if (tailTube) {
        tailTube.userData = { symbol: sym };
        scene.add(tailTube);
        raycastable.push(tailTube);
        objects.push(tailTube);
      }
    }
    
    // Label
    const lastP = pts[pts.length - 1];
    const short = pnlVal >= 0 ? `+$${pnlVal.toFixed(0)}` : `-$${Math.abs(pnlVal).toFixed(0)}`;
    const div = document.createElement('div');
    div.textContent = `${sym} ${short}`;
    Object.assign(div.style, {
      color: pnlColor(pnlVal), fontSize: '9px', fontWeight: '700', fontFamily: 'JetBrains Mono, monospace',
      background: 'rgba(1,1,5,0.5)', padding: '3px 9px', borderRadius: '12px',
      border: `1px solid ${pnlColor(pnlVal)}`, cursor: 'pointer', whiteSpace: 'nowrap',
      opacity: '0.4'
    });
    div.addEventListener('mouseenter', e => showTip(sym, data, e));
    div.addEventListener('mousemove', updateTipPos);
    div.addEventListener('mouseleave', hideTip);
    const label = new CSS2DObject(div);
    label.position.set(lastP.x + 0.45, lastP.y + 0.35, zPos);
    scene.add(label);
    symbolMeshes.set(sym, { objects, label });
  });
  

  // ----- AGGREGATE TOTAL EQUITY LINE (z = 14, same scale) -----
  const cumByTs = new Map();
  syms.forEach(sym => {
    let prev = 0;
    (data.history[sym] || []).forEach(([ts, cum]) => {
      const delta = cum - prev;
      cumByTs.set(ts, (cumByTs.get(ts) || 0) + delta);
      prev = cum;
    });
  });
  const sortedCum = [...cumByTs.entries()].sort((a, b) => a[0] - b[0]);
  let running = 0;
  const totalPts = [];
  sortedCum.forEach(([ts, delta]) => {
    running += delta;
    totalPts.push(new THREE.Vector3((ts - data.timestamp) / 3600, yScale(running), 14));
  });
  if (totalPts.length > 1) {
    const totalTube = mkTube(totalPts, new THREE.Color(0x88aaff), 0.13);
    if (totalTube) {
      totalTube.material.emissive = new THREE.Color(0x4488cc);
      totalTube.material.emissiveIntensity = 0.55;
      totalTube.userData = { symbol: '__total__' };
      scene.add(totalTube);
      raycastable.push(totalTube);
    }
    const lastTot = totalPts[totalPts.length - 1];
    const totDiv = document.createElement('div');
    totDiv.textContent = `TOTAL  ${fmt(totalPnl)}`;
    Object.assign(totDiv.style, {
      color: '#aaccff', fontSize: '10px', fontWeight: '700', fontFamily: 'JetBrains Mono, monospace',
      background: 'rgba(1,1,5,.92)', padding: '4px 10px', borderRadius: '14px',
      border: '1px solid #88aaffaa'
    });
    const totalLabel = new CSS2DObject(totDiv);
    totalLabel.position.set(lastTot.x + 0.55, lastTot.y + 0.45, 14);
    scene.add(totalLabel);
  }
  
  updateVisibility();
  buildFilterPanel(syms, data);
  updateTradeHistory(data);
}

// Panel toggles
function makeToggle(toggleId, panelId, openArrow, closeArrow) {
  const btn = document.getElementById(toggleId);
  const panel = document.getElementById(panelId);
  let hidden = false;
  btn.addEventListener('click', () => {
    hidden = !hidden;
    panel.classList.toggle('hidden', hidden);
    btn.textContent = hidden ? closeArrow : openArrow;
  });
}
makeToggle('histToggle', 'histPanel', '◀', '▶');
makeToggle('filterToggle', 'filterPanel', '▶', '◀');
document.getElementById('btnAll').addEventListener('click', () => {
  if (!currentData) return;
  currentData.symbols.slice(0, 27).forEach(s => visibleSyms.add(s));
  updateVisibility();
  if (currentData) buildFilterPanel(currentData.symbols.slice(0, 27), currentData);
});
document.getElementById('btnNone').addEventListener('click', () => {
  visibleSyms.clear();
  updateVisibility();
  if (currentData) buildFilterPanel(currentData.symbols.slice(0, 27), currentData);
});

// SSE + data fetching
const liveEl = document.getElementById('liveIndicator');
async function initData() {
  try {
    const res = await fetch('/data');
    if (res.ok) {
      const d = await res.json();
      if (d.symbols) { render3D(d); updateTradeHistory(d); }
    }
  } catch (e) { console.debug("waiting for server"); }
}
function connectSSE() {
  const es = new EventSource('/events');
  es.onopen = () => { liveEl.textContent = '⬤ live'; liveEl.className = 'connected'; };
  es.onmessage = e => {
    try {
      const data = JSON.parse(e.data);
      if (!data.symbols) return;
      render3D(data);
      updateTradeHistory(data);
    } catch (_) {}
  };
  es.onerror = () => {
    liveEl.textContent = '⬤ reconnecting…';
    liveEl.className = '';
    es.close();
    setTimeout(connectSSE, 2000);
  };
}
initData().then(() => connectSSE());

// Animation loop
function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
  css2d.render(scene, camera);
}
animate();
window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  css2d.setSize(innerWidth, innerHeight);
});
</script>
