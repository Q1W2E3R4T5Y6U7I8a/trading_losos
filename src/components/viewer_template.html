<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Trading Viewer</title>
<style>
*{box-sizing:border-box}
:root{--bg:#07090c;--panel:#10151b;--line:#2b3540;--text:#edf3f7;--muted:#9aa8b5;--good:#23c483;--bad:#ff5a63;--accent:#f5b942}
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:Arial,Helvetica,sans-serif}
button,input{font:inherit}
#hud{position:fixed;top:0;left:0;right:0;z-index:5;display:flex;justify-content:space-between;align-items:flex-start;padding:18px 22px;background:rgba(16,21,27,.94);border-bottom:1px solid var(--line)}
#total{font-size:34px;font-weight:800;line-height:1}
#meta{font-size:12px;line-height:1.7;text-align:right;color:var(--muted)}
#bar{position:fixed;top:0;left:0;height:3px;background:var(--accent);z-index:6;width:0}
#tools{position:fixed;left:50%;bottom:20px;transform:translateX(-50%);z-index:7;display:flex;gap:8px;background:rgba(16,21,27,.94);border:1px solid var(--line);padding:8px}
#tools button{background:var(--panel);color:var(--text);border:1px solid var(--line);padding:8px 12px;cursor:pointer}
#tools button.active{background:var(--accent);border-color:var(--accent);color:#111}
#left,#right{position:fixed;top:86px;bottom:78px;width:270px;z-index:6;background:rgba(16,21,27,.94);border:1px solid var(--line);overflow:auto;padding:12px}
#left{left:16px}
#right{right:16px}
h2{font-size:13px;margin:0 0 12px;text-transform:uppercase;color:var(--accent)}
.row{display:flex;justify-content:space-between;gap:10px;border-bottom:1px solid var(--line);padding:6px 0;font-size:12px}
.trade{border:1px solid var(--line);border-left:3px solid var(--accent);margin:0 0 7px;padding:8px;font-size:12px;line-height:1.45;background:rgba(255,255,255,.03)}
.trade.good{border-left-color:var(--good)}
.trade.bad{border-left-color:var(--bad)}
.trade b{font-size:13px}
.muted{color:var(--muted)}
.group{margin:10px 0 6px;border-top:1px solid var(--line);padding-top:8px}
.group:first-child{margin-top:0;border-top:0;padding-top:0}
.group-head{display:flex;align-items:center;justify-content:space-between;gap:8px;color:var(--accent);font-size:12px;font-weight:700;margin-bottom:4px}
.group-head label{display:flex;align-items:center;gap:7px}
.group-items{padding-left:14px}
.sym{display:flex;align-items:center;gap:8px;padding:3px 0;font-size:11px}
.sym input{accent-color:var(--accent)}
.sym b.good,#total.good{color:var(--good)}
.sym b.bad,#total.bad{color:var(--bad)}
.pair-label{opacity:1;transition:opacity .12s ease}
.pair-label.hot{opacity:1}
#tip{position:fixed;z-index:9;background:var(--panel);color:var(--text);border:1px solid var(--line);padding:10px;min-width:180px;font-size:12px;pointer-events:none;opacity:0}
#tip.on{opacity:1}
#live{position:fixed;left:50%;bottom:4px;transform:translateX(-50%);z-index:8;font-size:11px;color:var(--muted)}
#canvas{position:fixed;inset:0;z-index:1}
@media(max-width:900px){
#left,#right{display:none}
#hud{padding:12px}
#total{font-size:26px}
#tools{bottom:18px;width:calc(100% - 24px);justify-content:center}
#tools button{padding:8px 9px;font-size:12px}
}
</style>
<script type="importmap">
{"imports":{"three":"https://unpkg.com/three@0.128.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.128.0/examples/jsm/"}}
</script>
</head>
<body>
<div id="bar"></div>
<div id="hud">
<div id="total">$0.00</div>
<div id="meta">
<div>TIME <b id="time">--:--:--</b></div>
<div>OPEN <b id="open">0</b></div>
<div>SYMBOLS <b id="count">0</b></div>
<div>PROGRESS <b id="progress">0.0%</b></div>
</div>
</div>
<div id="left">
<h2>Trades</h2>
<div class="row"><span>Closed</span><b id="closed">0</b></div>
<div class="row"><span>Win rate</span><b id="win">0%</b></div>
<div class="row"><span>Average</span><b id="avg">$0.00</b></div>
<div id="trades"></div>
</div>
<div id="right">
<h2>Symbols</h2>
<div class="row"><button id="all">All</button><button id="none">None</button></div>
<div id="symbols"></div>
</div>
<div id="tools">
<button id="ma">MA</button>
<button id="rsi">RSI</button>
<button id="session">SESSION</button>
</div>
<div id="tip"></div>
<div id="live">connecting</div>
<script type="module">
import * as THREE from "three";
import {OrbitControls} from "three/addons/controls/OrbitControls.js";
import {CSS2DRenderer,CSS2DObject} from "three/addons/renderers/CSS2DRenderer.js";

const $=id=>document.getElementById(id);
const fmt=v=>(v>=0?"+":"-")+"$"+Math.abs(Number(v||0)).toFixed(2);
const time=ts=>ts?new Date(ts*1000).toLocaleTimeString([], {hour:"2-digit",minute:"2-digit",second:"2-digit"}):"--:--:--";
const dur=(a,b)=>Math.max(0,Math.round((b-a)/3600))+"h";
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const y=v=>clamp(Number(v||0)*0.35,-10,18);
const palette={good:0x23c483,bad:0xff5a63,accent:0xf5b942,grid:0x0f8f5f,text:"#edf3f7",muted:"#9aa8b5"};
const color=v=>Number(v)>0?palette.good:Number(v)<0?palette.bad:palette.accent;
const textColor=v=>Number(v)>0?"#23c483":Number(v)<0?"#ff5a63":"#edf3f7";
const tone=v=>Number(v)>0?"good":Number(v)<0?"bad":"flat";
const GROUPS=[
  ["USD",["EURUSD","USDCHF","GBPUSD","USDJPY","USDCAD","AUDUSD","NZDUSD"]],
  ["CHF",["EURCHF","GBPCHF","CHFJPY","CADCHF","AUDCHF","NZDCHF"]],
  ["EUR",["EURGBP","EURJPY","EURCAD","EURAUD","EURNZD"]],
  ["GBP",["GBPJPY","GBPCAD","GBPAUD","GBPNZD"]],
  ["JPY",["CADJPY","AUDJPY","NZDJPY"]],
  ["AUD",["AUDCAD","AUDNZD"]],
];
const groupNames=new Map(GROUPS.flatMap(([name,items])=>items.map(sym=>[sym,name])));

let data=null;
let visible=new Set();
let renderedStrategy=null;
let objects=new Map();
let hits=[];
let hoverSymbol=null;

const scene=new THREE.Scene();
scene.background=new THREE.Color(0x07090c);
scene.fog=new THREE.FogExp2(0x07090c,0.012);

const camera=new THREE.PerspectiveCamera(45,innerWidth/innerHeight,0.1,1000);
camera.position.set(23,18,40);
camera.lookAt(0,0,0);

const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth,innerHeight);
renderer.domElement.id="canvas";
document.body.appendChild(renderer.domElement);

const labels=new CSS2DRenderer();
labels.setSize(innerWidth,innerHeight);
labels.domElement.style.cssText="position:fixed;inset:0;pointer-events:none;z-index:2";
document.body.appendChild(labels.domElement);

const controls=new OrbitControls(camera,renderer.domElement);
controls.enableDamping=true;
controls.dampingFactor=.08;

scene.add(new THREE.AmbientLight(0xedf3f7,.65));
const light=new THREE.DirectionalLight(0xffffff,1);
light.position.set(12,20,10);
scene.add(light);

const grid=new THREE.GridHelper(70,28,palette.grid,palette.grid);
grid.material.transparent=true;
grid.material.opacity=.72;
grid.position.y=-.2;
scene.add(grid);

const ray=new THREE.Raycaster();
const mouse=new THREE.Vector2();

function label(text,x,z,size="11px"){
  const div=document.createElement("div");
  div.textContent=text;
  div.style.cssText=`color:${palette.muted};background:#10151b;border:1px solid #2b3540;padding:3px 6px;font-size:${size};white-space:nowrap`;
  const obj=new CSS2DObject(div);
  obj.position.set(x,-1.5,z);
  scene.add(obj);
  return obj;
}

for(const h of [-24,-18,-12,-6,0,6]){
  label(h===0?"NOW":String(h),h,16,"10px");
}

function tube(points,c,r=.06){
  if(points.length<2)return null;
  const curve=new THREE.CatmullRomCurve3(points);
  const geo=new THREE.TubeGeometry(curve,Math.max(24,points.length*5),r,6,false);
  const mat=new THREE.MeshStandardMaterial({color:c,roughness:.5,metalness:.1});
  return new THREE.Mesh(geo,mat);
}

function dot(xv,yv,zv,c,sym){
  const mesh=new THREE.Mesh(
    new THREE.SphereGeometry(.14,16,16),
    new THREE.MeshStandardMaterial({color:c,emissive:c,emissiveIntensity:.15})
  );
  mesh.position.set(xv,yv,zv);
  mesh.userData.symbol=sym;
  scene.add(mesh);
  hits.push(mesh);
  return mesh;
}

function makeText(sym,pnl,xv,yv,zv){
  const div=document.createElement("div");
  div.textContent=`${sym} ${fmt(pnl)}`;
  div.className="pair-label";
  div.dataset.sym=sym;
  div.style.cssText=`color:${textColor(pnl)};background:#10151b;border:1px solid #2b3540;padding:2px 4px;font-size:6px;white-space:nowrap`;
  const obj=new CSS2DObject(div);
  obj.position.set(xv,yv,zv);
  scene.add(obj);
  return obj;
}

function orderedSymbols(raw){
  const source=new Set(raw||[]);
  const out=[];
  for(const [,items] of GROUPS){
    for(const sym of items){
      if(source.has(sym)&&!out.includes(sym))out.push(sym);
    }
  }
  for(const sym of raw||[]){
    if(!out.includes(sym))out.push(sym);
  }
  return out;
}

function groupedSymbols(syms){
  const buckets=GROUPS.map(([name])=>[name,[]]);
  const other=["Other",[]];
  for(const sym of syms){
    const name=groupNames.get(sym);
    const bucket=buckets.find(([n])=>n===name);
    (bucket||other)[1].push(sym);
  }
  return other[1].length?buckets.concat([other]):buckets;
}

function clear(){
  hits=[];
  for(const group of objects.values()){
    for(const obj of group){
      if(obj.element)obj.element.remove();
      if(obj.geometry)obj.geometry.dispose();
      if(obj.material)obj.material.dispose();
      scene.remove(obj);
    }
  }
  objects.clear();
}

function setVisible(){
  for(const [sym,group] of objects){
    const on=visible.has(sym);
    for(const obj of group){
      obj.visible=on;
      if(obj.element)obj.element.style.display=on?"block":"none";
    }
  }
  applyHover();
}

function applyHover(){
  for(const group of objects.values()){
    for(const obj of group){
      if(obj.element?.classList?.contains("pair-label")){
        obj.element.classList.toggle("hot", obj.element.dataset.sym===hoverSymbol);
      }
    }
  }
}

function render(d){
  data=d||{};
  const strategy=data._strategy||"ma";
  const syms=orderedSymbols(data.symbols||[]).slice(0,40);
  if(renderedStrategy!==strategy){
    visible=new Set(syms);
    renderedStrategy=strategy;
  }else if(!visible.size){
    for(const s of syms)visible.add(s);
  }
  clear();
  const now=data.timestamp||Date.now()/1000;
  syms.forEach((sym,i)=>{
    const hist=data.history?.[sym]||[];
    const pnl=data.profits?.[sym]||0;
    const z=i-syms.length/2;
    const pts=[];
    const group=[];
    for(const row of hist){
      const ts=Number(row[0]);
      const val=Number(row[1]);
      const x=clamp(-(now-ts)/3600,-30,8);
      const p=new THREE.Vector3(x,y(val),z);
      pts.push(p);
      group.push(dot(x,y(val),z,color(val),sym));
    }
    if(pts.length>=2){
      const line=tube(pts,color(pnl));
      if(line){
        line.userData.symbol=sym;
        scene.add(line);
        hits.push(line);
        group.push(line);
      }
    }
    if(data.open_positions?.[sym]){
      const p=pts.at(-1)||new THREE.Vector3(0,y(pnl),z);
      const live=tube([p,new THREE.Vector3(0,y(pnl),z)],palette.accent,.04);
      if(live){
        live.userData.symbol=sym;
        scene.add(live);
        hits.push(live);
        group.push(live);
      }
    }
    const base=pts.at(-1)||new THREE.Vector3(0,y(pnl),z);
    group.push(makeText(sym,pnl,base.x+.45,base.y+.35,z));
    objects.set(sym,group);
  });
  setVisible();
  hud();
  tradeList();
  symbolList(syms);
}

function hud(){
  const profits=Object.values(data?.profits||{});
  const total=profits.reduce((a,b)=>a+Number(b||0),0);
  $("total").textContent=fmt(total);
  $("total").className=tone(total);
  $("time").textContent=time(data?.timestamp);
  $("open").textContent=Object.keys(data?.open_positions||{}).length;
  $("count").textContent=(data?.symbols||[]).length;
  const p=Number(data?.progress||0);
  $("progress").textContent=(p*100).toFixed(1)+"%";
  $("bar").style.width=(p*100)+"%";
}

function tradeList(){
  const trades=(data?.trades||[]).slice().reverse();
  const wins=trades.filter(t=>Number(t.pnl)>0).length;
  const avg=trades.length?trades.reduce((a,t)=>a+Number(t.pnl||0),0)/trades.length:0;
  $("closed").textContent=trades.length;
  $("win").textContent=trades.length?Math.round(wins*100/trades.length)+"%":"0%";
  $("avg").textContent=fmt(avg);
  const live=Object.entries(data?.open_positions||{}).map(([s,p])=>`<div class="trade ${tone(p.unrealized_pnl)}"><b>${s}</b><div>${p.type} LIVE ${fmt(p.unrealized_pnl)}</div><div class="muted">${time(p.open_time)} to ${time(p.close_time)}</div></div>`);
  const done=trades.slice(0,60).map(t=>`<div class="trade ${tone(t.pnl)}"><b>${t.symbol}</b><div>${t.type||"BUY"} ${fmt(t.pnl)}</div><div class="muted">${time(t.open_time)} to ${time(t.close_time)} ${dur(t.open_time,t.close_time)}</div></div>`);
  $("trades").innerHTML=live.concat(done).join("");
}

function symbolList(syms){
  $("symbols").innerHTML=groupedSymbols(syms).filter(([,items])=>items.length).map(([name,items])=>{
    const allOn=items.every(s=>visible.has(s));
    const someOn=items.some(s=>visible.has(s));
    const rows=items.map(s=>`<label class="sym"><input type="checkbox" data-sym="${s}" ${visible.has(s)?"checked":""}><span>${s}</span><b class="${tone(data?.profits?.[s]||0)}">${fmt(data?.profits?.[s]||0)}</b></label>`).join("");
    return `<div class="group"><div class="group-head"><label><input type="checkbox" data-group="${name}" ${allOn?"checked":""} ${someOn&&!allOn?"data-mixed='1'":""}>${name}</label><span>${items.length}</span></div><div class="group-items">${rows}</div></div>`;
  }).join("");
  $("symbols").querySelectorAll("input[data-mixed]").forEach(x=>{x.indeterminate=true});
  $("symbols").querySelectorAll("input[data-group]").forEach(x=>{
    x.onchange=()=>{
      const group=groupedSymbols(syms).find(([name])=>name===x.dataset.group);
      for(const sym of group?.[1]||[])x.checked?visible.add(sym):visible.delete(sym);
      setVisible();
      symbolList(syms);
    };
  });
  $("symbols").querySelectorAll("input[data-sym]").forEach(x=>{
    x.onchange=()=>{
      x.checked?visible.add(x.dataset.sym):visible.delete(x.dataset.sym);
      setVisible();
      symbolList(syms);
    };
  });
}

function tip(sym,e){
  const pnl=data?.profits?.[sym]||0;
  const pos=data?.open_positions?.[sym];
  const trades=(data?.trades||[]).filter(t=>t.symbol===sym);
  $("tip").innerHTML=`<b>${sym}</b><div>${fmt(pnl)}</div><div>${pos?pos.type+" open":"closed "+trades.length}</div>`;
  $("tip").style.left=e.clientX+14+"px";
  $("tip").style.top=e.clientY+14+"px";
  $("tip").classList.add("on");
}

window.addEventListener("mousemove",e=>{
  mouse.x=e.clientX/innerWidth*2-1;
  mouse.y=-(e.clientY/innerHeight)*2+1;
  ray.setFromCamera(mouse,camera);
  const hit=ray.intersectObjects(hits)[0];
  const sym=hit?.object?.userData?.symbol||null;
  if(sym&&data){
    hoverSymbol=sym;
    tip(sym,e);
  }else{
    hoverSymbol=null;
    $("tip").classList.remove("on");
  }
  applyHover();
});

async function switchTo(strategy){
  await fetch("/switch",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({strategy})});
  await status();
  const res=await fetch("/data");
  render(await res.json());
}

async function status(){
  try{
    const res=await fetch("/strategy");
    const info=await res.json();
    for(const id of ["ma","rsi","session"])$(id).classList.toggle("active",info.current===id);
  }catch(e){}
}

async function init(){
  await status();
  try{
    const res=await fetch("/data");
    render(await res.json());
  }catch(e){}
  events();
}

function events(){
  const es=new EventSource("/events");
  es.onopen=()=>{$("live").textContent="live"};
  es.onmessage=e=>{
    try{render(JSON.parse(e.data))}catch(err){}
  };
  es.onerror=()=>{
    $("live").textContent="reconnecting";
    es.close();
    setTimeout(events,1500);
  };
}

$("ma").onclick=()=>switchTo("ma");
$("rsi").onclick=()=>switchTo("rsi");
$("session").onclick=()=>switchTo("session");
$("all").onclick=()=>{const syms=orderedSymbols(data?.symbols||[]);for(const s of syms)visible.add(s);setVisible();symbolList(syms)};
$("none").onclick=()=>{const syms=orderedSymbols(data?.symbols||[]);visible.clear();setVisible();symbolList(syms)};

function animate(){
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene,camera);
  labels.render(scene,camera);
}

window.addEventListener("resize",()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
  labels.setSize(innerWidth,innerHeight);
});

init();
animate();
</script>
</body>
</html>
